name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Deployment is handled automatically by Cloudflare Pages'
# native Git integration — connect the repo in the CF dashboard.
# This workflow just verifies the build passes on every push/PR.

jobs:
  build:
    runs-on: ubuntu-latest
    name: Type-check & build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
